parameters:
  - name: baseUrl
    displayName: 'Frontend base URL (e.g. http://1.2.3.4)'
    type: string
  - name: iteration
    displayName: 'Iteration number'
    type: string
    default: '1'
  - name: nodeType
    type: string
    default: 'Standard_D2s_v4'
  - name: nodeCount
    type: string
    default: '2'
  - name: k8sVersion
    type: string
    default: '1.35'
  - name: clusterRegion
    type: string
    default: 'germanywestcentral'
  - name: lbType
    type: string
    default: 'azure-lb'
  - name: runnerType
    type: string
    default: 'azure-pipelines'
  - name: storageAccountName
    type: string
    default: ''
  - name: storageAccountKey
    type: string
    default: ''

trigger: none

# Microsoft-hosted agents do not support region selection — the runner may be in West Europe (Amsterdam)
# rather than germanywestcentral where the AKS cluster resides. This introduces ~5-10 ms extra latency
# compared to AWS CodeBuild (eu-central-1) and GCP Cloud Build (europe-west3) which run in-region.
# Documented as a limitation in the thesis.
pool:
  vmImage: ubuntu-latest

steps:
  - script: |
      date +%s > /tmp/install_start_epoch
      npm ci
      npx playwright install chromium --with-deps
      echo $(($(date +%s) - $(cat /tmp/install_start_epoch))) > /tmp/install_seconds
    displayName: Install dependencies

  - script: bash scripts/metrics/measure-rtt.sh "${{ parameters.baseUrl }}"
    displayName: Measure network RTT

  - script: |
      date +%s > /tmp/test_start_epoch
      set +e
      npm run e2e
      TEST_EXIT=$?
      echo $(($(date +%s) - $(cat /tmp/test_start_epoch))) > /tmp/test_seconds
      exit $TEST_EXIT
    displayName: Run Playwright tests
    env:
      CLOUD_PROVIDER: azure
      ENVIRONMENT: aks
      BASE_URL: ${{ parameters.baseUrl }}
      ITERATION: ${{ parameters.iteration }}
      NODE_TYPE: ${{ parameters.nodeType }}
      NODE_COUNT: ${{ parameters.nodeCount }}
      K8S_VERSION: ${{ parameters.k8sVersion }}
      CLUSTER_REGION: ${{ parameters.clusterRegion }}
      LB_TYPE: ${{ parameters.lbType }}
      RUNNER_TYPE: ${{ parameters.runnerType }}

  - script: |
      mkdir -p results
      cat > results/runner_timings.json << EOF
      {
        "installSeconds": $(cat /tmp/install_seconds 2>/dev/null || echo 0),
        "testSeconds": $(cat /tmp/test_seconds 2>/dev/null || echo 0)
      }
      EOF
    displayName: Write runner timings
    condition: always()

  - script: |
      az storage blob upload-batch \
        --account-name "${{ parameters.storageAccountName }}" \
        --account-key "${{ parameters.storageAccountKey }}" \
        --destination artifacts \
        --destination-path "runs/$(Build.BuildId)" \
        --source . \
        --pattern "results/**" || true
      az storage blob upload-batch \
        --account-name "${{ parameters.storageAccountName }}" \
        --account-key "${{ parameters.storageAccountKey }}" \
        --destination artifacts \
        --destination-path "runs/$(Build.BuildId)" \
        --source . \
        --pattern "test-results/**" || true
    displayName: Upload artifacts to Blob Storage
    condition: always()
