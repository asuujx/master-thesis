steps:
  - name: 'node:20'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci &&
        npx playwright install chromium --with-deps &&
        bash scripts/metrics/measure-rtt.sh "$BASE_URL" &&
        npm run e2e
    env:
      - 'CLOUD_PROVIDER=gcp'
      - 'ENVIRONMENT=gke'
      - 'BASE_URL=$_BASE_URL'
      - 'ITERATION=$_ITERATION'
      - 'NODE_TYPE=$_NODE_TYPE'
      - 'NODE_COUNT=$_NODE_COUNT'
      - 'K8S_VERSION=$_K8S_VERSION'
      - 'CLUSTER_REGION=$_CLUSTER_REGION'
      - 'LB_TYPE=$_LB_TYPE'
      - 'RUNNER_TYPE=$_RUNNER_TYPE'

artifacts:
  objects:
    location: 'gs://thesis-test-artifacts-$PROJECT_ID/runs/$BUILD_ID'
    paths:
      - 'results/**/*'
      - 'test-results/**/*'

options:
  logging: GCS_ONLY
