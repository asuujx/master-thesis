version: 0.2

env:
  variables:
    CLOUD_PROVIDER: aws
    ENVIRONMENT: eks
    ITERATION: "1"
    NODE_TYPE: t3.medium
    NODE_COUNT: "2"
    K8S_VERSION: "1.35"
    CLUSTER_REGION: eu-central-1
    LB_TYPE: aws-classic-lb
    RUNNER_TYPE: codebuild

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
      - npx playwright install chromium --with-deps

  build:
    commands:
      - npm run e2e

  post_build:
    commands:
      - aws s3 sync results/ s3://$ARTIFACTS_BUCKET/runs/$CODEBUILD_BUILD_ID/results/ --quiet || true
      - aws s3 sync test-results/ s3://$ARTIFACTS_BUCKET/runs/$CODEBUILD_BUILD_ID/test-results/ --quiet || true
