version: 0.2

env:
  variables:
    CLOUD_PROVIDER: aws
    ENVIRONMENT: eks
    ITERATION: "1"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
      - npx playwright install chromium --with-deps

  build:
    commands:
      - npm run e2e

  post_build:
    commands:
      - aws s3 sync results/ s3://$ARTIFACTS_BUCKET/runs/$CODEBUILD_BUILD_ID/results/ --quiet || true
      - aws s3 sync test-results/ s3://$ARTIFACTS_BUCKET/runs/$CODEBUILD_BUILD_ID/test-results/ --quiet || true
